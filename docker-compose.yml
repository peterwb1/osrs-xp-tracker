services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: osrstracker
      POSTGRES_USER: osrs
      POSTGRES_PASSWORD: osrs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osrs -d osrstracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: OsrsTracker.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=osrstracker;Username=osrs;Password=osrs
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: osrstracker_test
      POSTGRES_USER: osrs
      POSTGRES_PASSWORD: osrs
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osrs -d osrstracker_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
